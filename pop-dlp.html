<!DOCTYPE html>
<html>
<head>
    <title>DLP JS Dialogs (alert, confirm, prompt)</title>
</head>
<style>
    ul {
      list-style-type: none;
      text-align: left;
      padding: 0;
    }
    li {
      margin-bottom: 20px;
    }
</style>
<script>
    function sensitiveBlock() {
      let message = "";
      // Add sensitive numbers to the message string
      message += "SSN 1: 489-36-8350\n";
      message += "SSN 2: 514-14-8905\n";
      message += "Credit Card: 5370-4638-8881-3020\n";
      message += "Credit Card: 4929-3813-3266-4295\n";

      return message;
    }

    function jsAlert() {
      const message = "JS Alert\n" + sensitiveBlock();
      alert(message);
      log("Clicked JS Alert (OK dismissed)");
    }

    function jsAlertNoArgument() {
      window.alert();
      log("window.alert() called with no argument");
    }

    function jsAlertWithUndefined() {
      window.alert(undefined);
      log("window.alert(undefined) called");
    }

    function jsAlertWithNull() {
      window.alert(null);
      log("window.alert(null) called");
    }

    function jsAlertWithFalse() {
      window.alert(false);
      log("window.alert(false) called");
    }

    function jsAlertWithZero() {
      window.alert(0);
      log("window.alert(0) called");
    }

    function jsAlertWithEmptyString() {
      window.alert('');
      log("window.alert('') called");
    }

    function jsConfirm() {
      const message = "JS Confirm\n" + sensitiveBlock() + "\n\nPress OK or Cancel.";
      const ok = confirm(message);
      log("JS Confirm result: " + (ok ? "OK (true)" : "Cancel (false)"));
    }

    function jsPrompt() {
      const message = "JS Prompt\n" + sensitiveBlock() + "\n\nEnter text (sensitive data may appear in the input default):";
      const defaultValue = "232-45-2367";
      const value = prompt(message, defaultValue);
      if (value === null) {
        log("JS Prompt result: dismissed (null)");
      } else {
        log("JS Prompt result: " + JSON.stringify(value));
      }
    }

    function log(msg) {
      var result = document.getElementById("result");
      result.innerHTML = msg;
    }

    /**
     * Demo: alert + setTimeout — tests whether code after alert runs only after dismiss (native),
     * or immediately (non-blocking / wrapped alert).
     */
    function showSecretDemo() {
      var box = document.getElementById("secretCodeBox");
      var code = document.getElementById("secretCode");
      code.textContent = "TEMP-SECRET-7K2Q9M";
      box.style.display = "block";
      box.style.opacity = "1";
      log("Secret is now visible.");
    }

    function hideSecretCode() {
      var box = document.getElementById("secretCodeBox");
      box.style.display = "none";
      log("Secret removed (setTimeout fired at " + new Date().toISOString() + ")");
    }

    /**
     * Native semantics: setTimeout is scheduled only AFTER alert returns.
     * User should see the secret on the page while the alert is open; after OK, secret stays ~5s then disappears.
     */
    function alertThenTimerRemovesSecret() {
      showSecretDemo();
      var t0 = Date.now();
      alert(
        "You'll see a secret code on the page below. After you dismiss this dialog, it will disappear in 5 seconds.\n\n" +
          "(With real window.alert, nothing after alert() runs until you click OK.)"
      );
      log("alert() returned at +" + (Date.now() - t0) + "ms from button click — setTimeout scheduled now.");
      setTimeout(hideSecretCode, 5000);
    }

    /**
     * Timer is scheduled BEFORE alert. With a blocking native alert, the 5s timer often will not fire until
     * after dismiss; with a non-blocking mock/wrapper, the secret may disappear while the dialog is still open.
     */
    function timerThenAlertRemovesSecret() {
      showSecretDemo();
      var t0 = Date.now();
      setTimeout(function () {
        log("setTimeout fired at +" + (Date.now() - t0) + "ms (before or after alert, depending on environment).");
        hideSecretCode();
      }, 5000);
      alert(
        "A 5-second timer was already started. If alert is truly blocking, the secret should still be visible until you dismiss this dialog, then may disappear soon after.\n\n" +
          "If alert returns immediately, the secret may vanish while this dialog is open."
      );
      log("alert() returned at +" + (Date.now() - t0) + "ms.");
    }
</script>
<body>
<h1>DLP JS Dialogs</h1>
<h2>Sensitive Data Section</h2>
<ul>
  <li>SSN 1: 489-36-8350</li>
  <li>SSN 2: 514-14-8905</li>
  <li>Credit Card: 5370-4638-8881-3020</li>
  <li>Credit Card: 4929-3813-3266-4295</li>
</ul>

<ul style="list-style-type: none">
    <li>
        <button type="button" onclick="jsAlert()">Click for JS Alert</button>
    </li>
    <li>
        <button type="button" onclick="jsAlertNoArgument()">Click for window.alert() (no argument)</button>
    </li>
    <li>
        <button type="button" onclick="jsAlertWithUndefined()">Click for window.alert(undefined)</button>
    </li>
    <li>
        <button type="button" onclick="jsAlertWithNull()">Click for window.alert(null)</button>
    </li>
    <li>
        <button type="button" onclick="jsAlertWithFalse()">Click for window.alert(false)</button>
    </li>
    <li>
        <button type="button" onclick="jsAlertWithZero()">Click for window.alert(0)</button>
    </li>
    <li>
        <button type="button" onclick="jsAlertWithEmptyString()">Click for window.alert('')</button>
    </li>
    <li>
        <button type="button" onclick="alertThenTimerRemovesSecret()">
          Alert then 5s timer removes secret (code after alert)
        </button>
    </li>
    <li>
        <button type="button" onclick="timerThenAlertRemovesSecret()">
          5s timer then alert (timer scheduled before alert)
        </button>
    </li>
    <li>
        <button type="button" onclick="jsConfirm()">Click for JS Confirm</button>
    </li>
    <li>
        <button type="button" onclick="jsPrompt()">Click for JS Prompt</button>
    </li>
</ul>
<h2>Secret + alert timing demo</h2>
<p id="secretCodeBox" style="display: none; padding: 12px; border: 2px dashed #333; max-width: 420px; background: #fff8e6">
  <strong>Secret code:</strong>
  <span id="secretCode">TEMP-SECRET-7K2Q9M</span>
</p>

<h4>Result:</h4>
<p id="result" style="color: green"></p>
</body>
</html>
